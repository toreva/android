name: Android Shadow CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  reproducibility_package:
    name: reproducibility/package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install schema validator
        run: python -m pip install --upgrade pip jsonschema
      - name: Validate reproducibility package
        run: python ci/validate_repro_package.py

  gateway_boundary:
    name: ci/boundary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Boundary self-test
        run: python ci/check_gateway_boundary.py --self-test
      - name: Gateway-only boundary check
        run: python ci/check_gateway_boundary.py

  lint:
    name: ci/lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
      - name: Run Android lint
        run: ./gradlew --no-daemon lintDebug

  typecheck:
    name: ci/typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
      - name: Compile Kotlin
        run: ./gradlew --no-daemon :app:compileDebugKotlin

  unit:
    name: ci/unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
      - name: Run unit tests
        run: ./gradlew --no-daemon testDebugUnitTest

  secrets:
    name: security/secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  build:
    name: ci/build
    runs-on: ubuntu-latest
    needs:
      - reproducibility_package
      - gateway_boundary
      - lint
      - typecheck
      - unit
      - secrets
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
      - name: Build debug APK
        run: ./gradlew --no-daemon assembleDebug
