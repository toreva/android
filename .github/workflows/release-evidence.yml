name: Release Evidence

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  release_evidence:
    name: release/evidence
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install schema validator
        run: python -m pip install --upgrade pip jsonschema
      - name: Validate reproducibility package
        run: python ci/validate_repro_package.py
      - name: Gateway-only boundary check
        run: python ci/check_gateway_boundary.py
      - name: Secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
      - name: Build release artifact
        run: ./gradlew --no-daemon assembleRelease
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-spdx
          path: sbom.spdx.json
      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-unsigned
          path: app/build/outputs/apk/release/app-release-unsigned.apk
      - name: Build provenance attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: app/build/outputs/apk/release/app-release-unsigned.apk
      - name: Upload signature references
        uses: actions/upload-artifact@v4
        with:
          name: signature-references
          path: compliance/release/signature-references.md
